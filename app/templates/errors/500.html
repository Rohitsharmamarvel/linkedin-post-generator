{% extends "base.html" %}
{% block title %}500 — Server Error | LinkScale{% endblock %}
{% block content %}
<div
    style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding: 48px 24px;">
    <div style="font-size:5rem; font-weight:800; color:#ef4444; line-height:1; margin-bottom:16px;">500</div>
    <h1 style="font-size:1.75rem; font-weight:700; margin-bottom:12px; color:var(--color-text-primary);">Something Went
        Wrong</h1>
    <p style="color:var(--color-text-muted); max-width:440px; margin-bottom:32px; line-height:1.6;">
        An unexpected error occurred on our end. Our team has been notified.
        Please try again in a moment.
    </p>
    <a href="/dashboard" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
