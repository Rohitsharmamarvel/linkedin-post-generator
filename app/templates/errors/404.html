{% extends "base.html" %}
{% block title %}404 — Page Not Found | Linked Autopilot{% endblock %}
{% block content %}
<div
    style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding: 48px 24px;">
    <div style="font-size:5rem; font-weight:800; color:var(--color-accent); line-height:1; margin-bottom:16px;">404
    </div>
    <h1 style="font-size:1.75rem; font-weight:700; margin-bottom:12px; color:var(--color-text-primary);">Page Not Found
    </h1>
    <p style="color:var(--color-text-muted); max-width:400px; margin-bottom:32px; line-height:1.6;">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
