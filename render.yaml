services:
  - type: web
    name: linkscale-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app('prod')" --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: LINKEDIN_PERSON_URN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    autoDeploy: true

  - type: worker
    name: linkscale-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: linkscale-web
          envVarKey: GEMINI_API_KEY
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    autoDeploy: true
